<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAVEN Monitor</title>
  <!-- Tailwind — local copy for reliable loading (no CDN dependency) -->
  <script src="/js/vendor/tailwind.play.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/app.css">
  <!-- Theme must load before first paint to avoid flash -->
  <script src="/js/components/theme.js"></script>
</head>
<body class="h-full text-gray-200">
  <div class="flex h-full">

    <!-- Sidebar -->
    <nav id="sidebar" class="w-56 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0">
      <div class="p-4 border-b border-gray-800">
        <div class="flex items-center justify-between">
          <h1 class="text-lg font-bold text-white tracking-tight">
            <span class="text-brand-500">&#9670;</span> RAVEN Monitor
          </h1>
          <a href="#alerts" id="alert-bell" class="alert-bell" title="Alerts" style="display:none">
            &#128276;<span id="alert-bell-count" class="alert-bell-badge">0</span>
          </a>
          <button id="theme-toggle" class="theme-toggle-btn" title="Toggle theme">&#9788;</button>
        </div>
        <p class="text-xs text-gray-500 mt-0.5">BC Gov NR Sector</p>
      </div>
      <ul class="flex-1 py-2 space-y-0.5 text-sm" id="nav-links">
        <li><a href="#dashboard"  class="nav-link" data-view="dashboard">
          <span class="nav-icon">&#9632;</span> Dashboard</a></li>
        <li><a href="#discover"   class="nav-link" data-view="discover">
          <span class="nav-icon">&#128269;</span> Discover</a></li>
        <li><a href="#versions"   class="nav-link" data-view="versions">
          <span class="nav-icon">&#9881;</span> Versions</a></li>
        <li><a href="#logs"       class="nav-link" data-view="logs">
          <span class="nav-icon">&#128196;</span> Log Search</a></li>
        <li><a href="#logtail"    class="nav-link" data-view="logtail">
          <span class="nav-icon">&#9112;</span> Log Tail</a></li>
        <li><a href="#heap"       class="nav-link" data-view="heap">
          <span class="nav-icon">&#128200;</span> JVM Heap</a></li>
        <li><a href="#pool"       class="nav-link" data-view="pool">
          <span class="nav-icon">&#128278;</span> Conn Pool</a></li>
        <li><a href="#load"       class="nav-link" data-view="load">
          <span class="nav-icon">&#9889;</span> Server Load</a></li>
        <li class="nav-separator"></li>
        <li><a href="#trends"    class="nav-link" data-view="trends">
          <span class="nav-icon">&#128200;</span> Trends</a></li>
        <li><a href="#deploys"   class="nav-link" data-view="deploys">
          <span class="nav-icon">&#128640;</span> Deploys</a></li>
        <li><a href="#alerts"    class="nav-link" data-view="alerts">
          <span class="nav-icon">&#128276;</span> Alerts
          <span id="alert-badge" class="alert-badge" style="display:none">0</span></a></li>
        <li><a href="#health"    class="nav-link" data-view="health">
          <span class="nav-icon">&#9829;</span> Health</a></li>
      </ul>
      <div class="p-3 border-t border-gray-800">
        <a href="#settings" class="nav-link" data-view="settings" style="border-left:none;padding-left:0.5rem">
          <span class="nav-icon">&#9881;</span> Settings</a>
      </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1 overflow-auto">
      <div id="view-container" class="p-6 max-w-6xl mx-auto">
        <!-- Views are injected here by the router -->
      </div>
    </main>

  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

  <!-- Chart.js — local copy for reliable loading (no CDN dependency) -->
  <script src="/js/vendor/chart.umd.min.js"></script>

  <!-- JS modules -->
  <script type="module" src="/js/components/toast.js"></script>
  <script type="module" src="/js/components/app-cache.js"></script>
  <script type="module" src="/js/components/server-picker.js"></script>
  <script type="module" src="/js/components/table.js"></script>
  <script type="module" src="/js/components/csv-export.js"></script>
  <script type="module" src="/js/views/dashboard.js"></script>
  <script type="module" src="/js/views/discover.js"></script>
  <script type="module" src="/js/views/versions.js"></script>
  <script type="module" src="/js/views/logs.js"></script>
  <script type="module" src="/js/views/log-tail.js"></script>
  <script type="module" src="/js/views/heap.js"></script>
  <script type="module" src="/js/views/pool.js"></script>
  <script type="module" src="/js/views/load.js"></script>
  <script type="module" src="/js/views/settings.js"></script>
  <script type="module" src="/js/views/trends.js"></script>
  <script type="module" src="/js/views/deploys.js"></script>
  <script type="module" src="/js/views/alerts.js"></script>
  <script type="module" src="/js/views/health.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
